spring.application.name=api-gateway

server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.server.webmvc.discovery.locator.enabled=true
spring.cloud.gateway.server.webmvc.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.server.webmvc.routes[0].id=account-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://ACCOUNT-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/account/**

spring.cloud.gateway.server.webmvc.routes[1].id=loan-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://LOAN-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/loan/**